set -g escape-time 0

unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

set-option -g default-shell /usr/bin/fish

set -g mouse on

set -g history-limit 50000

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"

set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

setw -g mode-keys vi

set -g base-index 1
setw -g pane-base-index 1

bind -n M-p previous-window
bind -n M-n next-window
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"
bind -n M-= split-window -h -c "#{pane_current_path}"
bind -n M-x confirm-before -p "kill-window #W? (y/n)" kill-window
bind -n M-\\ confirm-before -p "kill-pane #P? (y/n)" kill-pane

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
bind -n M-\[ switch-client -p
bind -n M-\] switch-client -n
bind -n M-s choose-tree -s
bind -n S-Space next-layout

bind -n M-r source-file ~/.tmux.conf \; display-message "Config reloaded"

set -g set-clipboard on

set -g allow-passthrough on

if-shell "command -v wl-copy" {
    bind-key -T copy-mode-vi v send-keys -X begin-selection
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "wl-copy"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
}

if-shell "! command -v wl-copy && command -v xsel" {
    bind-key -T copy-mode-vi v send-keys -X begin-selection
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xsel -ib"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xsel -ib"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xsel -ib"
}

if-shell "! command -v wl-copy && ! command -v xsel && command -v xclip" {
    bind-key -T copy-mode-vi v send-keys -X begin-selection
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
    bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard"
}

bind-key p run-shell "xsel -ob 2>/dev/null | tmux load-buffer -" \; paste-buffer

set -g pane-border-lines single
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

run ~/.config/tmux/plugins/catppuccin/catppuccin.tmux

set -g status-position bottom
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# Disable extra status-format lines (tmux 3.3+ adds pane & session status bars by default)
set -g status-format[1] ""
set -g status-format[2] ""

run ~/.config/tmux/plugins/tmux-cpu/cpu.tmux
run ~/.config/tmux/plugins/tmux-battery/battery.tmux

set -g automatic-rename off
setw -g allow-rename off
